<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Military teddy">
  <!-- Recolour via these CSS vars (defaults match the original art). -->
  <style>
    svg { --fur:#c08a52; --fur-dk:#9c6e3c; --snout:#ecd2aa; --eye:#2a1f15; --nose:#3a2a1c; --outline:#3a2a1c;
          --camo:#6a763f; --camo-dk:#454e29; --camo-lt:#8a9656; --helmet:#6a763f; --metal:#d4dae3;
          --gun:#2c3038; --gun-dk:#15171c; --flag-r:#d6333a; --flag-b:#2c4a9a; --flag-w:#eef0f5; }
    .o { stroke:var(--outline); stroke-width:2.2; stroke-linejoin:round; }
  </style>

  <!-- ears (behind head, peeking at the sides below the helmet brim) -->
  <g class="o">
    <circle cx="28" cy="34" r="7" fill="var(--fur)"/>
    <circle cx="72" cy="34" r="7" fill="var(--fur)"/>
  </g>
  <circle cx="28" cy="34" r="3.2" fill="var(--fur-dk)"/>
  <circle cx="72" cy="34" r="3.2" fill="var(--fur-dk)"/>

  <!-- legs / feet -->
  <g class="o">
    <ellipse cx="38" cy="93" rx="9" ry="7" fill="var(--fur)"/>
    <ellipse cx="62" cy="93" rx="9" ry="7" fill="var(--fur)"/>
  </g>

  <!-- camo uniform body -->
  <g class="o">
    <path d="M28 70 q22 -12 44 0 q4 16 -2 24 q-20 6 -40 0 q-6 -8 -2 -24 z" fill="var(--camo)"/>
  </g>
  <!-- camo splotches on the jacket -->
  <g fill="var(--camo-dk)">
    <ellipse cx="36" cy="78" rx="5" ry="4"/>
    <ellipse cx="58" cy="84" rx="6" ry="4.5"/>
    <ellipse cx="64" cy="74" rx="3.5" ry="3"/>
  </g>
  <g fill="var(--camo-lt)">
    <ellipse cx="46" cy="88" rx="4" ry="3"/>
    <ellipse cx="50" cy="73" rx="3.5" ry="2.6"/>
  </g>

  <!-- small flag patch on the (viewer-left) upper arm -->
  <g class="o" stroke-width="1.4">
    <rect x="25.5" y="72" width="8.4" height="5.6" rx="1" fill="var(--flag-w)"/>
  </g>
  <rect x="25.5" y="72" width="3.6" height="2.8" fill="var(--flag-b)"/>
  <rect x="29.1" y="72.6" width="4.8" height="1.1" fill="var(--flag-r)"/>
  <rect x="25.5" y="75.4" width="8.4" height="1.1" fill="var(--flag-r)"/>

  <!-- head -->
  <g class="o"><circle cx="50" cy="45" r="24" fill="var(--fur)"/></g>
  <!-- muzzle -->
  <g class="o"><ellipse cx="50" cy="54" rx="11" ry="8.5" fill="var(--snout)"/></g>
  <ellipse cx="50" cy="50" rx="3.7" ry="2.8" fill="var(--nose)"/>
  <!-- philtrum + a small determined (slightly down-turned) mouth -->
  <path d="M50 52.6 v2.7" fill="none" stroke="var(--nose)" stroke-width="1.6" stroke-linecap="round"/>
  <path d="M50 55.3 Q47 57.4 44.4 56.3 M50 55.3 Q53 57.4 55.6 56.3" fill="none" stroke="var(--nose)" stroke-width="1.6" stroke-linecap="round"/>
  <!-- eyes + furrowed (angry) brows, set close for a determined look -->
  <circle cx="43" cy="43.5" r="2.9" fill="var(--eye)"/>
  <circle cx="57" cy="43.5" r="2.9" fill="var(--eye)"/>
  <path d="M37 39.5 L46.5 43 M63 39.5 L53.5 43" stroke="var(--eye)" stroke-width="2.7" stroke-linecap="round"/>

  <!-- helmet: rounded combat helmet sitting low over the brow, with a thin flared brim -->
  <g class="o">
    <path d="M27 36 q-0.5 -19 23 -19 q23.5 0 23 19 q-23 6 -46 0 z" fill="var(--helmet)"/>
    <path d="M24 35.5 q26 7 52 0 q0.5 3.4 -2.6 4.6 q-23 5 -46.8 0 q-3.1 -1.2 -2.6 -4.6 z" fill="var(--camo-dk)"/>
  </g>
  <!-- chin straps down past the ears -->
  <path d="M29 38 q-2 9 3.5 13.5 M71 38 q2 9 -3.5 13.5" fill="none" stroke="var(--camo-dk)" stroke-width="2.4" stroke-linecap="round"/>
  <!-- helmet camo splotches -->
  <g fill="var(--camo-dk)">
    <ellipse cx="40" cy="27" rx="4" ry="3.2"/>
    <ellipse cx="59" cy="24" rx="3.4" ry="2.8"/>
    <ellipse cx="52" cy="30" rx="2.6" ry="2.1"/>
  </g>

  <!-- rifle across the chest (simplified M4 silhouette) -->
  <g class="o" transform="rotate(-15 50 80)">
    <rect x="30" y="76.5" width="40" height="5.5" rx="1.6" fill="var(--gun)"/>          <!-- receiver -->
    <rect x="22" y="77.5" width="9" height="3.6" rx="1.4" fill="var(--gun-dk)"/>         <!-- stock -->
    <rect x="68" y="78" width="14" height="2.6" rx="1.3" fill="var(--gun-dk)"/>          <!-- barrel -->
    <path d="M46 82 l8 0 -1.5 9 -5 0 z" fill="var(--gun-dk)"/>                            <!-- magazine -->
    <rect x="40" y="73.5" width="9" height="3" rx="1" fill="var(--gun-dk)"/>             <!-- top rail/sight -->
  </g>

  <!-- dog tags -->
  <path d="M44 64 L50 73 L56 64" fill="none" stroke="var(--metal)" stroke-width="1.6"/>
  <g class="o" stroke-width="1.4"><rect x="47.5" y="71.5" width="5" height="6.5" rx="1.2" fill="var(--metal)"/></g>

  <!-- paws gripping the rifle -->
  <g class="o">
    <ellipse cx="40" cy="84" rx="5.5" ry="5" fill="var(--fur)"/>
    <ellipse cx="62" cy="78" rx="5.5" ry="5" fill="var(--fur)"/>
  </g>
</svg>
