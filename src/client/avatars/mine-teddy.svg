<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100" role="img" aria-label="Military teddy">
  <!-- Recolour via these CSS vars (fall back to the defaults). -->
  <style>
    svg { --fur:#c08a52; --fur-dk:#9c6e3c; --snout:#ecd2aa; --helmet:#5d6b3a; --helmet-dk:#46512b;
          --nose:#3a2a1c; --eye:#2a1f15; --flag:#e23b3b; --pole:#e2e8f0; --outline:#3a2a1c; }
    .ln { stroke:var(--outline); stroke-width:2; }
  </style>
  <g stroke="var(--outline)" stroke-width="2" stroke-linejoin="round">
    <!-- ears -->
    <circle cx="29" cy="31" r="11" fill="var(--fur)"/>
    <circle cx="71" cy="31" r="11" fill="var(--fur)"/>
    <!-- body + limbs (behind the head) -->
    <ellipse cx="50" cy="79" rx="21" ry="18" fill="var(--fur)"/>
    <ellipse cx="27" cy="74" rx="8" ry="11" fill="var(--fur-dk)"/>
    <ellipse cx="73" cy="74" rx="8" ry="11" fill="var(--fur-dk)"/>
    <ellipse cx="39" cy="95" rx="9" ry="6" fill="var(--fur-dk)"/>
    <ellipse cx="61" cy="95" rx="9" ry="6" fill="var(--fur-dk)"/>
    <!-- belly patch -->
    <ellipse cx="50" cy="80" rx="12" ry="11" fill="var(--snout)" stroke="none"/>
    <!-- head -->
    <circle cx="50" cy="47" r="25" fill="var(--fur)"/>
    <!-- snout -->
    <ellipse cx="50" cy="55" rx="13" ry="10" fill="var(--snout)"/>
  </g>
  <!-- ear inners -->
  <circle cx="29" cy="31" r="5" fill="var(--fur-dk)"/>
  <circle cx="71" cy="31" r="5" fill="var(--fur-dk)"/>
  <!-- nose + mouth -->
  <ellipse cx="50" cy="50" rx="4.5" ry="3.4" fill="var(--nose)"/>
  <path d="M50 53 v3.5 M50 56.5 q-4 3 -7 1 M50 56.5 q4 3 7 1" fill="none" stroke="var(--nose)" stroke-width="1.7" stroke-linecap="round"/>
  <!-- eyes (slanted brows = determined) -->
  <circle cx="40" cy="44" r="3.1" fill="var(--eye)"/>
  <circle cx="60" cy="44" r="3.1" fill="var(--eye)"/>
  <path d="M35 39 l8 2 M65 39 l-8 2" stroke="var(--eye)" stroke-width="2" stroke-linecap="round"/>
  <!-- helmet: dome over the top of the head + brim -->
  <path d="M24 40 a26 26 0 0 1 52 0 z" fill="var(--helmet)" stroke="var(--outline)" stroke-width="2" stroke-linejoin="round"/>
  <rect x="20" y="37" width="60" height="6.5" rx="3.2" fill="var(--helmet-dk)" stroke="var(--outline)" stroke-width="2"/>
  <!-- camo blobs -->
  <circle cx="38" cy="27" r="5.5" fill="var(--helmet-dk)"/>
  <circle cx="60" cy="23" r="4.5" fill="var(--helmet-dk)"/>
  <circle cx="53" cy="32" r="3.5" fill="var(--helmet-dk)"/>
  <!-- flag held in the paw (ties to minesweeper) -->
  <line x1="80" y1="58" x2="80" y2="84" stroke="var(--pole)" stroke-width="2.6" stroke-linecap="round"/>
  <path d="M80 60 l14 4.5 -14 5 z" fill="var(--flag)" stroke="var(--outline)" stroke-width="1.6" stroke-linejoin="round"/>
</svg>
