<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" type="text/css" href="style.css">
	<title>Multiplayer Minesweeper</title>
</head>
<body>
	<header class="topbar">
		<h1>Multiplayer Minesweeper</h1>
		<div class="nickname-wrap">
			<label for="nickname_input">Nickname</label>
			<input id="nickname_input" type="text" maxlength="24" placeholder="Anonymous">
		</div>
	</header>

	<main>
		<section id="lobby_view" class="view">
			<div class="lobby-actions">
				<button id="create_room_button" class="btn btn-primary">Create new room</button>
				<button id="refresh_button" class="btn btn-secondary">Refresh</button>
			</div>
			<h2 class="section-title">Available rooms</h2>
			<ul id="room_list" class="room-list">
				<li class="room-empty">No rooms yet. Create one to get started.</li>
			</ul>
			<p id="lobby_message" class="lobby-message" style="display:none"></p>
		</section>

		<section id="game_view" class="view" style="display:none">
			<div class="game-header">
				<button id="leave_button" class="btn btn-ghost">← Back to lobby</button>
				<span id="player_message_label" class="game-status"></span>
			</div>
			<div id="player_div" class="player-board">
				<p id="player_name0" class="player-name"></p>
				<canvas id="game0" width="500" height="350"></canvas>
				<div class="player-controls">
					<button id="ready_button" class="btn btn-primary" onClick="ready()">Ready</button>
					<button id="restart_button" class="btn btn-secondary" style="display:none" onClick="restart()">Restart</button>
				</div>
			</div>
			<div id="all_opponents_div" class="opponents">
				<div class="opponent_div" data-slot>
					<p id="player_name1" class="player-name"></p>
					<canvas id="game1" width="250" height="175"></canvas>
				</div>
				<div class="opponent_div" data-slot>
					<p id="player_name2" class="player-name"></p>
					<canvas id="game2" width="250" height="175"></canvas>
				</div>
				<div class="opponent_div" data-slot>
					<p id="player_name3" class="player-name"></p>
					<canvas id="game3" width="250" height="175"></canvas>
				</div>
				<div class="opponent_div" data-slot>
					<p id="player_name4" class="player-name"></p>
					<canvas id="game4" width="250" height="175"></canvas>
				</div>
				<div class="opponent_div" data-slot>
					<p id="player_name5" class="player-name"></p>
					<canvas id="game5" width="250" height="175"></canvas>
				</div>
			</div>
		</section>
	</main>

<script src="/socket.io/socket.io.js"></script>
<script>
var COLOR_COUNT_DOWN_START = "#94a3b8";
var COUNT_DOWN_COLORS = ["#facc15", "#fb923c", "#f87171"];
var COLOR_GO_MESSAGE = "#22c55e";
var COLOR_WINNER = "#22c55e";
var COLOR_LOSER = "#f87171";

var COLOR_MINE = "#ef4444";
var COLOR_NUMBER = "#22c55e";
var COLOR_KNOWN = "#0f172a";
var COLOR_UNKNOWN = "#3b82f6";
var COLOR_BORDER = "#020617";
var COLOR_FLAGGED = "#ef4444";
var NUMBER_FONT = "Inter, system-ui, sans-serif";

var MINE = -1;
var FLAGGED = -2;
var UNKNOWN = -3;
var KNOWN = -4;

var rows = 15;
var cols = 20;
var border = 1;

var playerCanvas = document.getElementById("game0");
var playerCanvasHeight = playerCanvas.height;
var playerCanvasWidth = playerCanvas.width;
var playerCanvasSquareWidth = playerCanvasWidth / cols;
var playerCanvasSquareHeight = playerCanvasHeight / rows;

playerCanvas.onclick = keyClicked;
playerCanvas.oncontextmenu = function(event) {
	keyClicked(event);
	return false;
};

var id;
var inRoom = false;

var socket = io({ transports: ["websocket"] });

var lobbyView = document.getElementById("lobby_view");
var gameView = document.getElementById("game_view");
var roomList = document.getElementById("room_list");
var lobbyMessage = document.getElementById("lobby_message");
var nicknameInput = document.getElementById("nickname_input");
var messageLabel = document.getElementById("player_message_label");
var readyButton = document.getElementById("ready_button");

document.getElementById("create_room_button").addEventListener("click", function() {
	sendNameIfChanged();
	socket.emit("create_room");
});

document.getElementById("refresh_button").addEventListener("click", function() {
	socket.emit("list_rooms");
});

document.getElementById("leave_button").addEventListener("click", function() {
	socket.emit("leave_room");
});

var lastSentName = "";
nicknameInput.addEventListener("change", sendNameIfChanged);
nicknameInput.addEventListener("blur", sendNameIfChanged);

function sendNameIfChanged() {
	var name = (nicknameInput.value || "").trim();
	if (name !== lastSentName) {
		lastSentName = name;
		socket.emit("set_name", { name: name });
	}
}

socket.on("connected", function(data) {
	id = data.id;
});

socket.on("room_list", function(data) {
	renderRoomList(data.rooms || []);
});

socket.on("joined_room", function() {
	inRoom = true;
	showGameView();
	resetGameState();
});

socket.on("left_room", function() {
	inRoom = false;
	showLobbyView();
});

socket.on("join_failed", function(data) {
	showLobbyMessage(data && data.reason ? data.reason : "Couldn't join room");
});

socket.on("start_game", function(data) {
	hideReadyButton();
	countDown(data.time);
});

socket.on("game_ended", gameEnded);

socket.on("draw_board", function(data) {
	var games = data.games;
	var slots = document.querySelectorAll('[data-slot]');
	for (var i = 0; i < 6; i++) {
		var nameEl = document.getElementById("player_name" + i);
		var canvasEl = document.getElementById("game" + i);
		var slot = i === 0 ? null : slots[i - 1];
		if (i < games.length) {
			nameEl.textContent = games[i].playerName;
			drawBoard(games[i].board, games[i].state, canvasEl);
			if (slot) slot.style.display = "";
		} else {
			nameEl.textContent = "";
			clearCanvas(canvasEl);
			if (slot) slot.style.display = "none";
		}
	}
});

socket.on("lose", function() {
	showMessage("YOU LOSE", COLOR_LOSER);
});

socket.on("win", function() {
	showMessage("YOU WIN", COLOR_WINNER);
});

function showLobbyView() {
	lobbyView.style.display = "";
	gameView.style.display = "none";
	lobbyMessage.style.display = "none";
}

function showGameView() {
	lobbyView.style.display = "none";
	gameView.style.display = "";
}

function showLobbyMessage(text) {
	lobbyMessage.textContent = text;
	lobbyMessage.style.display = "";
	setTimeout(function() {
		lobbyMessage.style.display = "none";
	}, 4000);
}

function resetGameState() {
	readyButton.style.display = "";
	document.getElementById("restart_button").style.display = "none";
	messageLabel.style.display = "none";
	messageLabel.textContent = "";
	var slots = document.querySelectorAll('[data-slot]');
	for (var i = 0; i < 6; i++) {
		document.getElementById("player_name" + i).textContent = "";
		clearCanvas(document.getElementById("game" + i));
		if (i > 0) slots[i - 1].style.display = "none";
	}
}

function clearCanvas(canvas) {
	var ctx = canvas.getContext("2d");
	ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function hideReadyButton() {
	readyButton.style.display = "none";
}

function renderRoomList(rooms) {
	roomList.innerHTML = "";
	if (rooms.length === 0) {
		var li = document.createElement("li");
		li.className = "room-empty";
		li.textContent = "No rooms yet. Create one to get started.";
		roomList.appendChild(li);
		return;
	}
	rooms.forEach(function(room) {
		var li = document.createElement("li");
		li.className = "room-row";

		var info = document.createElement("div");
		info.className = "room-info";

		var title = document.createElement("div");
		title.className = "room-title";
		title.textContent = "Room " + room.id;
		info.appendChild(title);

		var meta = document.createElement("div");
		meta.className = "room-meta";
		var status = room.playing ? "In game" : "Waiting";
		meta.textContent = room.playerCount + "/" + room.maxPlayers + " · " + status + " · " + (room.players || []).join(", ");
		info.appendChild(meta);

		li.appendChild(info);

		var joinBtn = document.createElement("button");
		joinBtn.className = "btn btn-secondary";
		joinBtn.textContent = "Join";
		joinBtn.disabled = room.playing || room.playerCount >= room.maxPlayers;
		joinBtn.addEventListener("click", function() {
			sendNameIfChanged();
			socket.emit("join_room", { roomId: room.id });
		});
		li.appendChild(joinBtn);

		roomList.appendChild(li);
	});
}

function ready() {
	hideReadyButton();
	socket.emit("player_ready");
}

function gameEnded() {
	readyButton.style.display = "";
}

function restart() {
	socket.emit("restart");
}

function showMessage(text, color) {
	messageLabel.style.display = "";
	messageLabel.style.color = color;
	messageLabel.textContent = text;
}

function countDown(time) {
	messageLabel.style.display = "";
	countDownStep(time);
}

function countDownStep(number) {
	var color;
	var text;
	if (number <= 0) {
		color = COLOR_GO_MESSAGE;
		text = "GO";
		messageLabel.style.color = color;
		messageLabel.textContent = text;
		return;
	}
	if (number <= COUNT_DOWN_COLORS.length) {
		color = COUNT_DOWN_COLORS[number-1];
	} else {
		color = COLOR_COUNT_DOWN_START;
	}
	messageLabel.style.color = color;
	messageLabel.textContent = number;
	setTimeout(function() { countDownStep(number - 1); }, 1000);
}

function keyClicked(event) {
	if (!inRoom) return;
	event = event || window.event;
	var rect = playerCanvas.getBoundingClientRect();
	var x = event.clientX - rect.left;
	var y = event.clientY - rect.top;
	var c = getCol(x);
	var r = getRow(y);
	if (isLeftClick(event)) {
		socket.emit("left_click", { r: r, c: c, id: id });
	} else if (isRightClick(event)) {
		socket.emit("right_click", { r: r, c: c, id: id });
	}
}

function isRightClick(e) {
	return (e.which ? (e.which == 3) : (e.button ? (e.button == 2) : false));
}

function isLeftClick(e) {
	return (e.which ? (e.which == 1) : (e.button ? (e.button == 0) : false));
}

function getRow(y) {
	return Math.floor(y / playerCanvasSquareHeight);
}

function getCol(x) {
	return Math.floor(x / playerCanvasSquareWidth);
}

function getText(r, c, board) {
	return board[r][c] == MINE ? "X" : board[r][c] != 0 ? board[r][c] : "";
}

function drawSquare(r, c, board, state, canvas) {
	var ctx = canvas.getContext("2d");
	var height = canvas.height;
	var width = canvas.width;
	var squareWidth = width / cols;
	var squareHeight = height / rows;
	var x = c*squareWidth;
	var y = r*squareHeight;

	ctx.fillStyle = COLOR_BORDER;
	ctx.fillRect(x, y, squareWidth, squareHeight);
	ctx.fillStyle = state[r][c] == KNOWN ? COLOR_KNOWN : state[r][c] == FLAGGED ? COLOR_FLAGGED : COLOR_UNKNOWN;
	ctx.fillRect(c*squareWidth+border, r*squareHeight+border, squareWidth - 2*border, squareHeight - 2*border);
	if (state[r][c] == KNOWN) {
		if (board[r][c] != MINE) {
			ctx.fillStyle = COLOR_NUMBER;
		} else {
			ctx.fillStyle = COLOR_MINE;
		}
		ctx.font = "bold " + Math.floor(0.7*squareHeight) + "px " + NUMBER_FONT;
		ctx.textAlign = "center";
		ctx.textBaseline = "middle";
		ctx.fillText(getText(r, c, board), x + squareWidth/2, y + squareHeight/2 + 1);
	}
}

function drawBoard(board, state, canvas) {
	for (var r = 0; r < rows; r++) {
		for (var c = 0; c < cols; c++) {
			drawSquare(r, c, board, state, canvas);
		}
	}
}
</script>
</body>
</html>
