<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" type="text/css" href="style.css">
	<title>Multiplayer Minesweeper</title>
</head>
<body>
	<header class="topbar">
		<h1>Multiplayer Minesweeper</h1>
		<div id="user_badge" class="user-badge" style="display:none">
			Playing as <strong id="user_badge_name"></strong>
			<button id="change_name_button" class="btn btn-ghost" type="button">Change</button>
		</div>
	</header>

	<main>
		<section id="name_view" class="view name-view">
			<div class="name-card">
				<h2>Welcome</h2>
				<p class="name-subtitle">Pick a nickname to join the lobby.</p>
				<form id="name_form" class="name-form">
					<input id="name_input" type="text" maxlength="24" placeholder="Your nickname" autocomplete="off" autofocus>
					<button type="submit" class="btn btn-primary">Enter lobby</button>
				</form>
				<p id="name_error" class="name-error" style="display:none"></p>
			</div>
		</section>

		<section id="lobby_view" class="view" style="display:none">
			<div class="lobby-actions">
				<button id="create_room_button" class="btn btn-primary">Create new room</button>
				<button id="refresh_button" class="btn btn-secondary">Refresh</button>
			</div>

			<h2 class="section-title">Open rooms</h2>
			<ul id="open_room_list" class="room-list">
				<li class="room-empty" data-empty-open>No open rooms. Create one to get started.</li>
			</ul>

			<h2 class="section-title section-title-spaced">In progress</h2>
			<ul id="busy_room_list" class="room-list">
				<li class="room-empty" data-empty-busy>No games in progress.</li>
			</ul>

			<p id="lobby_message" class="lobby-message" style="display:none"></p>
		</section>

		<section id="game_view" class="view game-view" style="display:none">
			<div class="game-header">
				<button id="leave_button" class="btn btn-ghost">← Back to lobby</button>
				<div class="game-progress">
					<span id="game_progress_text"></span>
					<span id="round_timer" class="round-timer"></span>
				</div>
			</div>
			<div class="game-grid">
				<div class="game-left">
					<div id="player_div" class="player-board">
						<p id="player_name0" class="player-name"></p>
						<div class="board-wrap">
							<canvas id="game0" width="500" height="350"></canvas>
							<div id="board_overlay" class="board-overlay" style="display:none"></div>
						</div>
						<div class="player-controls">
							<button id="ready_button" class="btn btn-primary">Ready</button>
							<span id="ready_status" class="ready-status"></span>
						</div>
					</div>
					<div id="all_opponents_div" class="opponents">
						<div class="opponent_div" data-slot>
							<p id="player_name1" class="player-name"></p>
							<canvas id="game1" width="250" height="175"></canvas>
						</div>
						<div class="opponent_div" data-slot>
							<p id="player_name2" class="player-name"></p>
							<canvas id="game2" width="250" height="175"></canvas>
						</div>
						<div class="opponent_div" data-slot>
							<p id="player_name3" class="player-name"></p>
							<canvas id="game3" width="250" height="175"></canvas>
						</div>
						<div class="opponent_div" data-slot>
							<p id="player_name4" class="player-name"></p>
							<canvas id="game4" width="250" height="175"></canvas>
						</div>
						<div class="opponent_div" data-slot>
							<p id="player_name5" class="player-name"></p>
							<canvas id="game5" width="250" height="175"></canvas>
						</div>
					</div>
				</div>
				<aside class="game-side">
					<div class="side-card">
						<h3 class="side-title">Series</h3>
						<div class="series-config">
							<span class="series-config-label">Games</span>
							<select id="game_count_select" disabled></select>
							<span id="game_count_readonly" class="series-config-readonly"></span>
						</div>
						<div class="series-config">
							<span class="series-config-label">Round time</span>
							<select id="round_seconds_select" disabled></select>
							<span id="round_seconds_readonly" class="series-config-readonly"></span>
						</div>
						<div class="series-config">
							<span class="series-config-label">Mine penalty</span>
							<select id="death_penalty_select" disabled></select>
							<span id="death_penalty_readonly" class="series-config-readonly"></span>
						</div>
						<div id="series_status" class="series-status"></div>
					</div>
					<div id="bots_card" class="side-card" style="display:none">
						<h3 class="side-title">Bots</h3>
						<div class="series-config">
							<span class="series-config-label">Speed</span>
							<select id="bot_speed_select"></select>
							<span id="bot_speed_readonly" class="series-config-readonly"></span>
						</div>
						<div class="bot-actions">
							<button id="add_bot_button" class="btn btn-secondary" type="button">Add bot</button>
							<button id="remove_bot_button" class="btn btn-ghost" type="button">Remove bot</button>
						</div>
						<p id="bot_status" class="series-status"></p>
					</div>
					<div class="side-card">
						<h3 class="side-title">Scoreboard</h3>
						<ol id="scoreboard" class="scoreboard"></ol>
					</div>
				</aside>
			</div>
		</section>
	</main>

<script src="/socket.io/socket.io.js"></script>
<script>
var COUNT_DOWN_COLORS = ["#facc15", "#fb923c", "#f87171"];
var COLOR_GO_MESSAGE = "#22c55e";
var COLOR_WINNER = "#22c55e";
var COLOR_LOSER = "#f87171";

var COLOR_MINE = "#ef4444";
var COLOR_NUMBER = "#22c55e";
var COLOR_KNOWN = "#0f172a";
var COLOR_UNKNOWN = "#3b82f6";
var COLOR_BORDER = "#020617";
var COLOR_FLAGGED = "#ef4444";
var NUMBER_FONT = "Inter, system-ui, sans-serif";

var MINE = -1;
var FLAGGED = -2;
var UNKNOWN = -3;
var KNOWN = -4;

var rows = 15;
var cols = 20;
var border = 1;

var playerCanvas = document.getElementById("game0");
var playerCanvasHeight = playerCanvas.height;
var playerCanvasWidth = playerCanvas.width;
var playerCanvasSquareWidth = playerCanvasWidth / cols;
var playerCanvasSquareHeight = playerCanvasHeight / rows;

playerCanvas.onclick = boardClicked;
playerCanvas.oncontextmenu = function(event) {
	boardClicked(event);
	return false;
};

var id;
var myName = "";
var currentRoom = null;
var inRoom = false;

var socket = io({ transports: ["websocket"] });

var nameView = document.getElementById("name_view");
var lobbyView = document.getElementById("lobby_view");
var gameView = document.getElementById("game_view");
var openRoomList = document.getElementById("open_room_list");
var busyRoomList = document.getElementById("busy_room_list");
var lobbyMessage = document.getElementById("lobby_message");
var nameForm = document.getElementById("name_form");
var nameInput = document.getElementById("name_input");
var nameError = document.getElementById("name_error");
var userBadge = document.getElementById("user_badge");
var userBadgeName = document.getElementById("user_badge_name");
var changeNameButton = document.getElementById("change_name_button");
var boardOverlay = document.getElementById("board_overlay");
var roundTimer = document.getElementById("round_timer");
var gameProgressText = document.getElementById("game_progress_text");
var readyButton = document.getElementById("ready_button");
var readyStatus = document.getElementById("ready_status");
var gameCountSelect = document.getElementById("game_count_select");
var gameCountReadonly = document.getElementById("game_count_readonly");
var roundSecondsSelect = document.getElementById("round_seconds_select");
var roundSecondsReadonly = document.getElementById("round_seconds_readonly");
var deathPenaltySelect = document.getElementById("death_penalty_select");
var deathPenaltyReadonly = document.getElementById("death_penalty_readonly");
var seriesStatus = document.getElementById("series_status");
var scoreboardEl = document.getElementById("scoreboard");
var botsCard = document.getElementById("bots_card");
var botSpeedSelect = document.getElementById("bot_speed_select");
var botSpeedReadonly = document.getElementById("bot_speed_readonly");
var addBotButton = document.getElementById("add_bot_button");
var removeBotButton = document.getElementById("remove_bot_button");
var botStatus = document.getElementById("bot_status");

var frozenUntil = 0;
var freezeTickHandle = null;
var roundDeadline = null;
var roundTickHandle = null;
var roundResultShown = false;

nameForm.addEventListener("submit", function(e) {
	e.preventDefault();
	var name = (nameInput.value || "").trim();
	if (!name) {
		showNameError("Please enter a nickname.");
		return;
	}
	socket.emit("set_name", { name: name });
});

changeNameButton.addEventListener("click", function() {
	if (inRoom) {
		socket.emit("leave_room");
	}
	nameInput.value = myName;
	showNameView();
});

document.getElementById("create_room_button").addEventListener("click", function() {
	socket.emit("create_room");
});

document.getElementById("refresh_button").addEventListener("click", function() {
	socket.emit("list_rooms");
});

document.getElementById("leave_button").addEventListener("click", function() {
	socket.emit("leave_room");
});

readyButton.addEventListener("click", function() {
	socket.emit("player_ready");
});

gameCountSelect.addEventListener("change", function() {
	socket.emit("set_game_count", { count: parseInt(gameCountSelect.value, 10) });
});

roundSecondsSelect.addEventListener("change", function() {
	socket.emit("set_round_seconds", { seconds: parseInt(roundSecondsSelect.value, 10) });
});

deathPenaltySelect.addEventListener("change", function() {
	socket.emit("set_death_penalty", { seconds: parseInt(deathPenaltySelect.value, 10) });
});

botSpeedSelect.addEventListener("change", function() {
	socket.emit("set_bot_speed", { ms: parseInt(botSpeedSelect.value, 10) });
});

addBotButton.addEventListener("click", function() {
	socket.emit("add_bot");
});

removeBotButton.addEventListener("click", function() {
	socket.emit("remove_bot");
});

function formatRoundTime(s) {
	if (s <= 0) return "0:00";
	var m = Math.floor(s / 60);
	var sec = s % 60;
	return m + ":" + (sec < 10 ? "0" : "") + sec;
}

function formatRoundOption(s) {
	return s === 0 ? "Unlimited" : (s % 60 === 0 ? (s/60) + " min" : s + "s");
}

function formatPenaltyOption(s) {
	return s === 0 ? "None" : s + "s";
}

function formatBotSpeed(ms) {
	if (ms <= 250) return "Fast";
	if (ms <= 500) return "Medium";
	return "Slow";
}

function ordinal(n) {
	var s = ["th", "st", "nd", "rd"];
	var v = n % 100;
	return n + (s[(v - 20) % 10] || s[v] || s[0]);
}

socket.on("connected", function(data) {
	id = data.id;
});

socket.on("name_rejected", function(data) {
	showNameError((data && data.reason) || "That name was not accepted.");
});

socket.on("name_accepted", function(data) {
	myName = data.name;
	userBadgeName.textContent = myName;
	userBadge.style.display = "";
	if (!inRoom) showLobbyView();
});

socket.on("room_list", function(data) {
	renderRoomList(data.rooms || []);
});

socket.on("joined_room", function() {
	inRoom = true;
	showGameView();
	resetGameUI();
});

socket.on("left_room", function() {
	inRoom = false;
	currentRoom = null;
	showLobbyView();
});

socket.on("join_failed", function(data) {
	showLobbyMessage(data && data.reason ? data.reason : "Couldn't join room");
});

socket.on("room_state", function(state) {
	currentRoom = state;
	renderRoomState(state);
});

socket.on("start_game", function(data) {
	hideReadyButton();
	clearFreeze();
	roundResultShown = false;
	gameProgressText.textContent = "Game " + data.gameNumber + " of " + data.gameCount;
	countDown(data.time);
});

socket.on("game_result", function(data) {
	roundResultShown = true;
	var myEntry = (data.standings || []).find(function(s) { return s.id === id; });
	var text;
	if (data.winnerId === id) {
		text = "You won round " + data.gameNumber + " (+" + (myEntry ? myEntry.points : 0) + ")";
	} else if (myEntry) {
		var place = ordinal(myEntry.rank);
		var winnerPart = data.winnerName ? " — " + data.winnerName + " won" : "";
		text = "You placed " + place + " (+" + myEntry.points + ")" + winnerPart;
	} else {
		text = "Round " + data.gameNumber + " ended";
	}
	showOverlay(text, data.winnerId === id ? "win" : "lose");
	clearFreeze();
	stopRoundTimer();
});

socket.on("mine_hit", function(data) {
	frozenUntil = data.frozenUntil;
	startFreezeTick();
});

socket.on("series_ended", function(data) {
	var text;
	if (!data.winnerId) {
		text = "Series tied!";
	} else if (data.winnerId === id) {
		text = "You win the series 🏆";
	} else {
		text = data.winnerName + " wins the series!";
	}
	showOverlay(text, data.winnerId === id ? "win" : "lose", 5000);
	gameProgressText.textContent = "";
	stopRoundTimer();
});

socket.on("draw_board", function(data) {
	var games = data.games;
	var slots = document.querySelectorAll('[data-slot]');
	for (var i = 0; i < 6; i++) {
		var nameEl = document.getElementById("player_name" + i);
		var canvasEl = document.getElementById("game" + i);
		var slot = i === 0 ? null : slots[i - 1];
		if (i < games.length) {
			nameEl.textContent = games[i].playerName;
			drawBoard(games[i].board, games[i].state, canvasEl);
			if (slot) slot.style.display = "";
		} else {
			nameEl.textContent = "";
			clearCanvas(canvasEl);
			if (slot) slot.style.display = "none";
		}
	}
});

function showNameView() {
	nameView.style.display = "";
	lobbyView.style.display = "none";
	gameView.style.display = "none";
	nameError.style.display = "none";
	setTimeout(function() { nameInput.focus(); }, 0);
}

function showLobbyView() {
	nameView.style.display = "none";
	lobbyView.style.display = "";
	gameView.style.display = "none";
	lobbyMessage.style.display = "none";
}

function showGameView() {
	nameView.style.display = "none";
	lobbyView.style.display = "none";
	gameView.style.display = "";
}

function showNameError(text) {
	nameError.textContent = text;
	nameError.style.display = "";
}

function showLobbyMessage(text) {
	lobbyMessage.textContent = text;
	lobbyMessage.style.display = "";
	setTimeout(function() {
		lobbyMessage.style.display = "none";
	}, 4000);
}

function resetGameUI() {
	readyButton.style.display = "";
	hideOverlay();
	clearFreeze();
	stopRoundTimer();
	gameProgressText.textContent = "";
	roundTimer.textContent = "";
	for (var i = 0; i < 6; i++) {
		document.getElementById("player_name" + i).textContent = "";
		clearCanvas(document.getElementById("game" + i));
	}
	var slots = document.querySelectorAll('[data-slot]');
	for (var j = 0; j < slots.length; j++) slots[j].style.display = "none";
}

function showOverlay(text, kind, autoHideMs) {
	boardOverlay.style.display = "";
	boardOverlay.textContent = text;
	boardOverlay.className = "board-overlay" + (kind ? " board-overlay-" + kind : "");
	if (autoHideMs) {
		setTimeout(function() {
			if (boardOverlay.textContent === text) hideOverlay();
		}, autoHideMs);
	}
}

function hideOverlay() {
	boardOverlay.style.display = "none";
	boardOverlay.textContent = "";
	boardOverlay.className = "board-overlay";
}

function startFreezeTick() {
	clearFreezeTick();
	freezeTickHandle = setInterval(updateFreezeOverlay, 100);
	updateFreezeOverlay();
}

function clearFreezeTick() {
	if (freezeTickHandle) {
		clearInterval(freezeTickHandle);
		freezeTickHandle = null;
	}
}

function clearFreeze() {
	frozenUntil = 0;
	clearFreezeTick();
	if (boardOverlay.className.indexOf("board-overlay-frozen") !== -1) hideOverlay();
}

function updateFreezeOverlay() {
	var remaining = Math.max(0, frozenUntil - Date.now());
	if (remaining <= 0) {
		clearFreezeTick();
		if (boardOverlay.className.indexOf("board-overlay-frozen") !== -1) hideOverlay();
		return;
	}
	var s = Math.ceil(remaining / 1000);
	showOverlay("💥 " + s, "frozen");
}

function startRoundTimer(deadline) {
	stopRoundTimer();
	roundDeadline = deadline;
	if (!deadline) return;
	roundTickHandle = setInterval(updateRoundTimer, 500);
	updateRoundTimer();
}

function stopRoundTimer() {
	if (roundTickHandle) { clearInterval(roundTickHandle); roundTickHandle = null; }
	roundDeadline = null;
	roundTimer.textContent = "";
	roundTimer.classList.remove("round-timer-urgent");
}

function updateRoundTimer() {
	if (!roundDeadline) return;
	var remaining = Math.max(0, Math.round((roundDeadline - Date.now()) / 1000));
	roundTimer.textContent = "⏱ " + formatRoundTime(remaining);
	roundTimer.classList.toggle("round-timer-urgent", remaining <= 10 && remaining > 0);
	if (remaining <= 0) { clearInterval(roundTickHandle); roundTickHandle = null; }
}

function clearCanvas(canvas) {
	var ctx = canvas.getContext("2d");
	ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function hideReadyButton() {
	readyButton.style.display = "none";
}

function renderRoomList(rooms) {
	var openRooms = rooms.filter(function(r) { return r.phase === "planning"; });
	var busyRooms = rooms.filter(function(r) { return r.phase !== "planning"; });

	openRoomList.innerHTML = "";
	if (openRooms.length === 0) {
		openRoomList.appendChild(emptyRow("No open rooms. Create one to get started."));
	} else {
		openRooms.forEach(function(r) { openRoomList.appendChild(roomRow(r, true)); });
	}

	busyRoomList.innerHTML = "";
	if (busyRooms.length === 0) {
		busyRoomList.appendChild(emptyRow("No games in progress."));
	} else {
		busyRooms.forEach(function(r) { busyRoomList.appendChild(roomRow(r, false)); });
	}
}

function emptyRow(text) {
	var li = document.createElement("li");
	li.className = "room-empty";
	li.textContent = text;
	return li;
}

function roomRow(room, joinable) {
	var li = document.createElement("li");
	li.className = "room-row";

	var info = document.createElement("div");
	info.className = "room-info";

	var title = document.createElement("div");
	title.className = "room-title";
	title.textContent = room.ownerName + "'s room";
	info.appendChild(title);

	var meta = document.createElement("div");
	meta.className = "room-meta";
	var statusText;
	if (room.phase === "planning") {
		statusText = "Best of " + room.gameCount;
	} else {
		statusText = "Game " + room.gamesPlayed + " of " + room.gameCount;
	}
	meta.textContent = room.playerCount + "/" + room.maxPlayers + " · " + statusText + " · " + room.players.join(", ");
	info.appendChild(meta);

	li.appendChild(info);

	if (joinable) {
		var joinBtn = document.createElement("button");
		joinBtn.className = "btn btn-secondary";
		joinBtn.textContent = "Join";
		joinBtn.disabled = room.playerCount >= room.maxPlayers;
		joinBtn.addEventListener("click", function() {
			socket.emit("join_room", { roomId: room.id });
		});
		li.appendChild(joinBtn);
	} else {
		var badge = document.createElement("span");
		badge.className = "room-badge";
		badge.textContent = "In game";
		li.appendChild(badge);
	}

	return li;
}

function renderRoomState(state) {
	var isOwner = state.owner === id;
	populateSelect(gameCountSelect, state.gameCountOptions, function(n) { return String(n); });
	populateSelect(roundSecondsSelect, state.roundSecondsOptions, formatRoundOption);
	populateSelect(deathPenaltySelect, state.deathPenaltyOptions, formatPenaltyOption);

	gameCountSelect.value = String(state.gameCount);
	roundSecondsSelect.value = String(state.roundSeconds);
	deathPenaltySelect.value = String(state.deathPenalty);

	var canEdit = isOwner && state.phase === "planning";
	gameCountSelect.disabled = !canEdit;
	roundSecondsSelect.disabled = !canEdit;
	deathPenaltySelect.disabled = !canEdit;
	gameCountSelect.style.display = isOwner ? "" : "none";
	roundSecondsSelect.style.display = isOwner ? "" : "none";
	deathPenaltySelect.style.display = isOwner ? "" : "none";
	gameCountReadonly.style.display = isOwner ? "none" : "";
	roundSecondsReadonly.style.display = isOwner ? "none" : "";
	deathPenaltyReadonly.style.display = isOwner ? "none" : "";
	gameCountReadonly.textContent = "Best of " + state.gameCount;
	roundSecondsReadonly.textContent = formatRoundOption(state.roundSeconds);
	deathPenaltyReadonly.textContent = formatPenaltyOption(state.deathPenalty);

	var showBotCard = isOwner || (state.botCount && state.botCount > 0);
	botsCard.style.display = showBotCard ? "" : "none";
	if (showBotCard) {
		populateSelect(botSpeedSelect, state.botSpeedOptions, formatBotSpeed);
		botSpeedSelect.value = String(state.botSpeed);
		var canEditBotSpeed = isOwner && state.phase === "planning";
		botSpeedSelect.disabled = !canEditBotSpeed;
		botSpeedSelect.style.display = isOwner ? "" : "none";
		botSpeedReadonly.style.display = isOwner ? "none" : "";
		botSpeedReadonly.textContent = formatBotSpeed(state.botSpeed);
		var canAddBot = isOwner && state.phase === "planning" && state.botCount < state.maxBots;
		var canRemoveBot = isOwner && state.phase === "planning" && state.botCount > 0;
		addBotButton.style.display = isOwner ? "" : "none";
		removeBotButton.style.display = isOwner ? "" : "none";
		addBotButton.disabled = !canAddBot;
		removeBotButton.disabled = !canRemoveBot;
		if (state.botCount === 0) {
			botStatus.textContent = isOwner ? "Add a bot to practice solo." : "";
		} else {
			botStatus.textContent = state.botCount + " bot" + (state.botCount === 1 ? "" : "s") + " in this room.";
		}
	}

	if (state.phase === "playing" && state.roundDeadline) {
		if (!roundDeadline || roundDeadline !== state.roundDeadline) {
			startRoundTimer(state.roundDeadline);
		}
	} else {
		stopRoundTimer();
	}

	scoreboardEl.innerHTML = "";
	var ranked = state.players.slice().sort(function(a, b) { return b.score - a.score; });
	ranked.forEach(function(p, idx) {
		var li = document.createElement("li");
		li.className = "score-row";
		if (p.id === id) li.classList.add("score-row-me");

		var rank = document.createElement("span");
		rank.className = "score-rank";
		rank.textContent = (idx + 1) + ".";
		li.appendChild(rank);

		var name = document.createElement("span");
		name.className = "score-name";
		name.textContent = p.name + (p.isOwner ? " ★" : "");
		if (p.isBot) {
			var tag = document.createElement("span");
			tag.className = "score-bot-tag";
			tag.textContent = "BOT";
			name.appendChild(document.createTextNode(" "));
			name.appendChild(tag);
		}
		li.appendChild(name);

		var meta = document.createElement("span");
		meta.className = "score-meta";
		if (state.phase === "planning") {
			meta.textContent = p.ready ? "Ready" : "Waiting";
			meta.classList.add(p.ready ? "score-meta-ready" : "score-meta-waiting");
		} else if (p.finished) {
			meta.textContent = "Done";
			meta.classList.add("score-meta-ready");
		} else {
			meta.textContent = p.id === id ? "you" : "";
		}
		li.appendChild(meta);

		var score = document.createElement("span");
		score.className = "score-points";
		score.textContent = p.score;
		li.appendChild(score);

		scoreboardEl.appendChild(li);
	});

	var me = state.players.find(function(p) { return p.id === id; });
	var ownName = (me || {}).name || myName;
	document.getElementById("player_name0").textContent = ownName;
	document.getElementById("player_div").classList.toggle("idle", state.phase === "planning");

	if (state.phase === "playing" && me && me.finished && !roundResultShown) {
		showOverlay("Cleared — waiting for others", "win");
	} else if (boardOverlay.textContent === "Cleared — waiting for others") {
		hideOverlay();
	}

	if (state.phase === "planning") {
		if (state.gamesPlayed === 0 && !state.seriesWinner) {
			seriesStatus.textContent = state.players.length < 2
				? "Waiting for more players to join…"
				: "Click Ready when you're set.";
		} else {
			seriesStatus.textContent = "Next series starts when everyone clicks Ready.";
		}
		var me = state.players.find(function(p) { return p.id === id; });
		var iAmReady = me && me.ready;
		readyButton.style.display = iAmReady ? "none" : "";
		readyButton.disabled = state.players.length < 2;
		readyStatus.textContent = iAmReady ? "Waiting for others…" : "";
		gameProgressText.textContent = "";
		clearCanvas(playerCanvas);
	} else {
		seriesStatus.textContent = "Game " + (state.gamesPlayed >= state.gameCount ? state.gameCount : (state.gamesPlayed + 1)) + " of " + state.gameCount;
		readyButton.style.display = "none";
		readyStatus.textContent = "";
		if (!gameProgressText.textContent) {
			gameProgressText.textContent = "Game " + Math.min(state.gamesPlayed + 1, state.gameCount) + " of " + state.gameCount;
		}
	}
}

function populateSelect(select, options, fmt) {
	if (select.options.length === options.length) return;
	select.innerHTML = "";
	options.forEach(function(v) {
		var opt = document.createElement("option");
		opt.value = String(v);
		opt.textContent = fmt(v);
		select.appendChild(opt);
	});
}

function countDown(time) {
	countDownStep(time);
}

function countDownStep(number) {
	if (number <= 0) {
		showOverlay("GO", "go");
		setTimeout(function() {
			if (boardOverlay.textContent === "GO") hideOverlay();
		}, 700);
		return;
	}
	showOverlay(String(number), "count");
	boardOverlay.style.color = number <= COUNT_DOWN_COLORS.length ? COUNT_DOWN_COLORS[number - 1] : "#94a3b8";
	setTimeout(function() { countDownStep(number - 1); }, 1000);
}

function boardClicked(event) {
	if (!inRoom || !currentRoom || currentRoom.phase !== "playing") return;
	if (Date.now() < frozenUntil) return;
	event = event || window.event;
	var rect = playerCanvas.getBoundingClientRect();
	var scaleX = playerCanvas.width / rect.width;
	var scaleY = playerCanvas.height / rect.height;
	var x = (event.clientX - rect.left) * scaleX;
	var y = (event.clientY - rect.top) * scaleY;
	var c = getCol(x);
	var r = getRow(y);
	if (isLeftClick(event)) {
		socket.emit("left_click", { r: r, c: c, id: id });
	} else if (isRightClick(event)) {
		socket.emit("right_click", { r: r, c: c, id: id });
	}
}

function isRightClick(e) {
	return (e.which ? (e.which == 3) : (e.button ? (e.button == 2) : false));
}

function isLeftClick(e) {
	return (e.which ? (e.which == 1) : (e.button ? (e.button == 0) : false));
}

function getRow(y) { return Math.floor(y / playerCanvasSquareHeight); }
function getCol(x) { return Math.floor(x / playerCanvasSquareWidth); }

function getText(r, c, board) {
	return board[r][c] == MINE ? "X" : board[r][c] != 0 ? board[r][c] : "";
}

function drawSquare(r, c, board, state, canvas) {
	var ctx = canvas.getContext("2d");
	var height = canvas.height;
	var width = canvas.width;
	var squareWidth = width / cols;
	var squareHeight = height / rows;
	var x = c*squareWidth;
	var y = r*squareHeight;

	ctx.fillStyle = COLOR_BORDER;
	ctx.fillRect(x, y, squareWidth, squareHeight);
	ctx.fillStyle = state[r][c] == KNOWN ? COLOR_KNOWN : state[r][c] == FLAGGED ? COLOR_FLAGGED : COLOR_UNKNOWN;
	ctx.fillRect(c*squareWidth+border, r*squareHeight+border, squareWidth - 2*border, squareHeight - 2*border);
	if (state[r][c] == KNOWN) {
		ctx.fillStyle = board[r][c] != MINE ? COLOR_NUMBER : COLOR_MINE;
		ctx.font = "bold " + Math.floor(0.7*squareHeight) + "px " + NUMBER_FONT;
		ctx.textAlign = "center";
		ctx.textBaseline = "middle";
		ctx.fillText(getText(r, c, board), x + squareWidth/2, y + squareHeight/2 + 1);
	}
}

function drawBoard(board, state, canvas) {
	for (var r = 0; r < rows; r++) {
		for (var c = 0; c < cols; c++) {
			drawSquare(r, c, board, state, canvas);
		}
	}
}
</script>
